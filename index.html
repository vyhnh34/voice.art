<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Visualization — Projection Mapping</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      z-index: 10;
      transition: opacity 0.8s ease;
    }
    #overlay.fade-out { opacity: 0; pointer-events: none; }

    #start-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 14px 40px;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-family: monospace;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
    }
    #start-btn:hover { border-color: #fff; background: rgba(255,255,255,0.07); }

    #subtitle {
      margin-top: 14px;
      color: rgba(255,255,255,0.3);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 2px;
    }

    #hud {
      position: fixed;
      bottom: 24px; left: 24px;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
      line-height: 1.8;
      display: none;
    }
    #hud.visible { display: block; }
    #hud span { color: rgba(255,255,255,0.45); }

    canvas { display: block; }
  </style>
</head>
<body>

<div id="overlay">
  <button id="start-btn">ACTIVATE MIC</button>
  <p id="subtitle">speak · sing · breathe</p>
</div>

<div id="hud">
  VOL &nbsp;<span id="h-vol">—</span><br>
  PITCH <span id="h-pitch">—</span><br>
  SUSTAIN <span id="h-sus">—</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// ─── Audio Engine ──────────────────────────────────────────────────────────────
let audioCtx, analyserTime, analyserFreq;
let timeBuf, freqBuf;
const FFT = 2048;

async function initAudio() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);

  analyserTime = audioCtx.createAnalyser();
  analyserTime.fftSize = FFT;
  analyserTime.smoothingTimeConstant = 0.5;

  analyserFreq = audioCtx.createAnalyser();
  analyserFreq.fftSize = 1024;
  analyserFreq.smoothingTimeConstant = 0.8;

  src.connect(analyserTime);
  src.connect(analyserFreq);

  timeBuf = new Float32Array(FFT);
  freqBuf = new Uint8Array(analyserFreq.frequencyBinCount);
}

// RMS volume [0–1]
function getVolume() {
  if (!analyserTime) return 0;
  analyserTime.getFloatTimeDomainData(timeBuf);
  let sum = 0;
  for (let i = 0; i < timeBuf.length; i++) sum += timeBuf[i] * timeBuf[i];
  return Math.sqrt(sum / timeBuf.length);
}

// Autocorrelation pitch detection → Hz or -1
function getPitch() {
  if (!analyserTime) return -1;
  analyserTime.getFloatTimeDomainData(timeBuf);

  const SIZE = timeBuf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += timeBuf[i] * timeBuf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.012) return -1;

  // Trim silence edges
  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(timeBuf[i]) < 0.15) { r1 = i; break; } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(timeBuf[SIZE - i]) < 0.15) { r2 = SIZE - i; break; } }

  const buf = timeBuf.slice(r1, r2);
  const N = buf.length;
  const c = new Float32Array(N);
  for (let i = 0; i < N; i++) for (let j = 0; j < N - i; j++) c[i] += buf[j] * buf[j + i];

  let d = 0;
  while (d < N - 1 && c[d] > c[d + 1]) d++;

  let maxVal = -1, maxPos = -1;
  for (let i = d; i < N; i++) { if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; } }
  if (maxPos < 1 || maxPos >= N - 1) return -1;

  // Parabolic interpolation
  const x1 = c[maxPos - 1], x2 = c[maxPos], x3 = c[maxPos + 1];
  const a = (x1 + x3 - 2 * x2) / 2;
  const b = (x3 - x1) / 2;
  const T0 = a ? maxPos - b / (2 * a) : maxPos;

  const hz = audioCtx.sampleRate / T0;
  return (hz > 60 && hz < 1400) ? hz : -1;
}

// ─── Particle System ───────────────────────────────────────────────────────────
const MAX_PARTICLES = 1800;
const particles = [];

const HOLD_FRAMES = 300; // 5 s at 60 fps — full opacity hold
const FADE_FRAMES = 60;  // 1 s fade-out after hold

class Particle {
  constructor(x, y, opts) {
    this.x = x;
    this.y = y;
    const angle = opts.angle ?? Math.random() * Math.PI * 2;
    const speed = opts.speed ?? (1 + Math.random() * 3);
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.hue = opts.hue ?? 200;
    this.sat = 80 + Math.random() * 20;
    this.baseSize = opts.size ?? 3;
    this.size = this.baseSize;
    this.alpha = 1.0;
    this.glowRadius = opts.glowRadius ?? 0;
    this.age = 0;
    this.drag = 0.97 + Math.random() * 0.02;
  }

  update() {
    this.vx *= this.drag;
    this.vy *= this.drag;
    this.x += this.vx;
    this.y += this.vy;
    this.age++;

    if (this.age <= HOLD_FRAMES) {
      this.alpha = 1.0;
    } else {
      this.alpha = Math.max(0, 1 - (this.age - HOLD_FRAMES) / FADE_FRAMES);
    }
    this.size = this.baseSize * (0.4 + 0.6 * this.alpha);
  }

  draw(ctx) {
    if (this.alpha <= 0) return;
    const col = `hsla(${this.hue},${this.sat}%,65%,${this.alpha.toFixed(3)})`;

    if (this.glowRadius > 1) {
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glowRadius * this.alpha);
      grad.addColorStop(0, `hsla(${this.hue},${this.sat}%,75%,${(this.alpha * 0.35).toFixed(3)})`);
      grad.addColorStop(1, `hsla(${this.hue},${this.sat}%,65%,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.glowRadius * this.alpha, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(0.5, this.size), 0, Math.PI * 2);
    ctx.fill();
  }

  get dead() { return this.age > HOLD_FRAMES + FADE_FRAMES; }
}

// ─── p5.js Sketch ─────────────────────────────────────────────────────────────
new p5(function(p) {
  let canvas;
  let sustainTimer = 0;    // frames above threshold
  let smoothVol = 0;
  let smoothPitch = 200;   // Hz
  let smoothSustain = 0;
  let lastBurst = 0;
  let started = false;

  // HUD elements
  const hHud  = document.getElementById('hud');
  const hVol   = document.getElementById('h-vol');
  const hPitch = document.getElementById('h-pitch');
  const hSus   = document.getElementById('h-sus');

  p.setup = function() {
    canvas = p.createCanvas(window.innerWidth, window.innerHeight);
    canvas.elt.style.position = 'fixed';
    canvas.elt.style.top = '0';
    canvas.elt.style.left = '0';
    p.colorMode(p.HSB, 360, 100, 100, 1);
    p.noStroke();
    p.background(0);
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };

  p.draw = function() {
    // Motion trail — very dark fade
    const ctx = canvas.elt.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, p.width, p.height);

    if (!started) return;

    // ── Read audio ────────────────────────────────
    const rawVol = getVolume();
    const rawPitch = getPitch();

    smoothVol = smoothVol * 0.75 + rawVol * 0.25;
    if (rawPitch > 0) smoothPitch = smoothPitch * 0.8 + rawPitch * 0.2;

    const VOL_THRESH = 0.018;
    const vol = p.constrain(p.map(smoothVol, 0, 0.25, 0, 1), 0, 1);
    const active = smoothVol > VOL_THRESH;

    if (active) sustainTimer += 1;
    else sustainTimer = Math.max(0, sustainTimer - 3);

    smoothSustain = smoothSustain * 0.92 + (sustainTimer / 120) * 0.08;
    const sustain = p.constrain(smoothSustain, 0, 1);

    // Pitch → hue (log scale: 60Hz=0°, 1400Hz=300°)
    const pitchHue = p.constrain(
      p.map(Math.log(smoothPitch / 60), 0, Math.log(1400 / 60), 0, 300),
      0, 300
    );

    // Pitch → speed multiplier
    const speedMult = p.constrain(p.map(smoothPitch, 60, 1400, 0.5, 4.5), 0.5, 4.5);

    // Sustain → glow & decay
    const glowRadius = p.map(sustain, 0, 1, 0, 20);
    const decayBase  = p.map(sustain, 0, 1, 0.018, 0.004);

    // Particle size from volume
    const baseSize   = p.map(vol, 0, 1, 1.5, 12);

    // ── Spawn particles ───────────────────────────
    if (active && particles.length < MAX_PARTICLES) {
      // Burst count: volume-driven
      const burstCount = Math.floor(vol * 18);

      for (let i = 0; i < burstCount; i++) {
        const spawnX = Math.random() * p.width;
        const spawnY = Math.random() * p.height;
        const angle  = Math.random() * Math.PI * 2;
        const hueJitter = (Math.random() - 0.5) * 25;

        particles.push(new Particle(spawnX, spawnY, {
          angle,
          speed: (1.5 + Math.random() * 3) * speedMult * vol,
          hue: (pitchHue + hueJitter + 360) % 360,
          size: baseSize * (0.5 + Math.random() * 0.8),
          glowRadius: glowRadius * (0.4 + Math.random() * 0.8),
        }));
      }

      // Loud burst: scatter explosion from random point
      if (vol > 0.65 && p.frameCount - lastBurst > 8) {
        lastBurst = p.frameCount;
        const bx = Math.random() * p.width;
        const by = Math.random() * p.height;
        for (let i = 0; i < 40; i++) {
          const a = (i / 40) * Math.PI * 2;
          particles.push(new Particle(bx, by, {
            angle: a,
            speed: (4 + Math.random() * 6) * speedMult,
            hue: (pitchHue + (Math.random() - 0.5) * 40 + 360) % 360,
            size: baseSize * 1.4,
            glowRadius: glowRadius * 1.5,
          }));
        }
      }
    }

    // ── Draw & cull ───────────────────────────────
    ctx.save();
    ctx.globalCompositeOperation = 'screen'; // additive glow

    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw(ctx);
      if (particles[i].dead) particles.splice(i, 1);
    }

    ctx.restore();

    // ── Ambient center pulse ──────────────────────
    if (active) {
      const pulseSize = 4 + vol * 60 + sustain * 40;
      const pulseAlpha = 0.04 + vol * 0.08;
      const grad = ctx.createRadialGradient(
        p.width/2, p.height/2, 0,
        p.width/2, p.height/2, pulseSize
      );
      const h = pitchHue;
      grad.addColorStop(0, `hsla(${h},80%,70%,${pulseAlpha * 2})`);
      grad.addColorStop(1, `hsla(${h},80%,60%,0)`);
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.width/2, p.height/2, pulseSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ── HUD ──────────────────────────────────────
    hVol.textContent   = (smoothVol * 100).toFixed(1) + '%';
    hPitch.textContent = smoothPitch > 0 ? smoothPitch.toFixed(0) + ' Hz' : '—';
    hSus.textContent   = (sustain * 100).toFixed(0) + '%';
  };

  // ── Start button ─────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', async () => {
    try {
      await initAudio();
      started = true;
      const overlay = document.getElementById('overlay');
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.style.display = 'none', 900);
      hHud.classList.add('visible');
    } catch (err) {
      alert('Microphone access denied or unavailable.\n' + err.message);
    }
  });
});
</script>
</body>
</html>
