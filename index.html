<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Voice Is Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { position: fixed; inset: 0; }
    video  { display: none; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; gap: 14px;
      align-items: center; justify-content: center;
      background: #000; z-index: 20;
      transition: opacity 0.8s;
    }
    #overlay.out { opacity: 0; pointer-events: none; }

    #overlay .logo { width: 280px; height: auto; margin-bottom: 6px; }

    button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 11px 36px;
      font-size: 11px; letter-spacing: 4px;
      text-transform: uppercase; font-family: monospace;
      cursor: pointer; transition: all 0.2s;
    }
    button:hover { border-color: #fff; background: rgba(255,255,255,0.06); }

    #btn {
      border: none;
      font-family: 'Doto', monospace;
      font-optical-sizing: auto;
      font-weight: 700;
      font-variation-settings: "ROND" 0;
      letter-spacing: 6px;
      padding: 11px 20px;
    }
    #btn:hover { background: none; }
    #btn span { animation: pixel-blink 1.6s steps(1) infinite; }
    #btn span:nth-child(1) { animation-delay: 0.0s; }
    #btn span:nth-child(2) { animation-delay: 0.08s; }
    #btn span:nth-child(3) { animation-delay: 0.16s; }
    #btn span:nth-child(4) { animation-delay: 0.24s; }
    #btn span:nth-child(5) { animation-delay: 0.32s; }
    @keyframes pixel-blink {
      0%, 45%  { opacity: 1; }
      50%, 95% { opacity: 0; }
      100%     { opacity: 1; }
    }

    #hud-wrap {
      position: fixed; bottom: 20px; left: 20px;
      display: none;
    }
    #hud {
      font-size: 10px; letter-spacing: 1px;
      color: rgba(255,255,255,0.2); line-height: 2.1;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      max-height: 120px; opacity: 1;
    }
    #hud.collapsed { max-height: 0; opacity: 0; }
    #hud b { color: rgba(255,255,255,0.5); font-weight: normal; }
    #hud-toggle {
      background: none; border: none;
      color: rgba(255,255,255,0.25); font-size: 10px;
      cursor: pointer; padding: 0; letter-spacing: 1px;
      font-family: monospace; display: block;
      margin-bottom: 2px; transition: color 0.2s;
    }
    #hud-toggle:hover { color: rgba(255,255,255,0.6); }

    /* ── Camera capture button ─────────────────────────────── */
    #cam-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: none; border: none; padding: 8px;
      cursor: pointer; display: none; z-index: 15;
      opacity: 0.55; transition: opacity 0.2s, transform 0.2s;
    }
    #cam-btn:hover { opacity: 1; transform: scale(1.1); background: none; border: none; }

    #cam-menu {
      position: fixed; bottom: 58px; right: 20px;
      display: none; flex-direction: column; gap: 6px;
      z-index: 15;
    }
    #cam-menu.open { display: flex; }
    #cam-menu button {
      padding: 8px 18px; font-size: 10px; letter-spacing: 2px;
      background: rgba(0,0,0,0.7);
    }

    #rec-dot {
      position: fixed; bottom: 30px; right: 62px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff2244; display: none; z-index: 15;
      animation: recblink 0.9s infinite;
      cursor: pointer;
    }
    @keyframes recblink { 50% { opacity: 0.25; } }

    /* ── DIAL — visual-mode + camera controls (dialkit-styled) ────── */
    #dial {
      --dial-surface: rgba(255,255,255,0.05);
      --dial-surface-hover: rgba(255,255,255,0.1);
      --dial-surface-active: rgba(255,255,255,0.11);
      --dial-surface-subtle: rgba(255,255,255,0.06);
      --dial-text-label: rgba(255,255,255,0.7);
      --dial-text-primary: rgba(255,255,255,0.95);
      --dial-border: rgba(255,255,255,0.1);
      --dial-border-hover: rgba(255,255,255,0.15);
      --dial-glass-bg: #212121;
      --dial-dropdown-bg: #2a2a2a;
      --dial-radius: 8px;
      --dial-row-height: 34px;
      --dial-shadow: 0 8px 32px rgba(0,0,0,0.5);
      position: fixed; top: 20px; right: 20px; z-index: 16;
      display: none; font-family: monospace;
    }
    #dial-toggle {
      width: 34px; height: 34px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--dial-glass-bg); border: 1px solid var(--dial-border);
      border-radius: 50%; cursor: pointer; opacity: 0.65;
      transition: opacity 0.2s, transform 0.2s;
    }
    #dial-toggle:hover { opacity: 1; transform: scale(1.06); background: var(--dial-glass-bg); }
    #dial-toggle svg { width: 15px; height: 15px; }

    #dial-panel {
      position: absolute; top: 42px; right: 0; width: 230px;
      background: var(--dial-glass-bg); border: 1px solid var(--dial-border);
      border-radius: 12px; box-shadow: var(--dial-shadow);
      padding: 12px; display: none; flex-direction: column; gap: 8px;
    }
    #dial-panel.open { display: flex; }
    .dial-title {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dial-text-label); padding-bottom: 8px; margin-bottom: 2px;
      border-bottom: 1px solid var(--dial-surface-subtle);
    }

    .dialkit-select-trigger {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; height: var(--dial-row-height); padding: 0 10px;
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--dial-text-label); background: var(--dial-surface);
      border: none; border-radius: var(--dial-radius); cursor: pointer;
      transition: background 0.15s; font-family: monospace;
    }
    .dialkit-select-trigger:hover { background: var(--dial-surface-hover); }
    .dialkit-select-trigger[data-open="true"] { background: var(--dial-surface-active); }
    .dialkit-select-right { display: flex; align-items: center; gap: 6px; }
    .dialkit-select-value { color: var(--dial-text-primary); }
    .dialkit-select-chevron { width: 12px; height: 12px; opacity: 0.6; }

    .dialkit-select-dropdown {
      position: absolute; margin-top: 4px; width: 100%;
      background: var(--dial-dropdown-bg); border: 1px solid var(--dial-border);
      border-radius: var(--dial-radius); padding: 4px; z-index: 20;
      display: none; flex-direction: column; gap: 2px;
    }
    .dialkit-select-dropdown.open { display: flex; }
    .dialkit-select-option {
      display: block; width: 100%; padding: 7px 9px; text-align: left;
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--dial-text-label); background: transparent; border: none;
      border-radius: 6px; cursor: pointer; font-family: monospace;
      transition: background 0.15s, color 0.15s;
    }
    .dialkit-select-option:hover { background: var(--dial-surface-hover); }
    .dialkit-select-option[data-selected="true"] { color: var(--dial-text-primary); background: var(--dial-surface-active); }

    .dialkit-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 10px; height: var(--dial-row-height);
      background: var(--dial-surface); border-radius: var(--dial-radius);
      cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .dialkit-toggle:hover { background: var(--dial-surface-hover); }
    .dialkit-toggle-label {
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--dial-text-label); transition: color 0.15s;
    }
    .dialkit-toggle[data-checked="true"] .dialkit-toggle-label { color: var(--dial-text-primary); }
    .dialkit-toggle-track {
      width: 32px; height: 18px; border-radius: 9px;
      background: var(--dial-surface-active); position: relative; transition: background 0.2s;
    }
    .dialkit-toggle[data-checked="true"] .dialkit-toggle-track { background: var(--dial-border-hover); }
    .dialkit-toggle-thumb {
      position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
      border-radius: 7px; background: var(--dial-text-primary); transition: left 0.2s;
    }
    .dialkit-toggle[data-checked="true"] .dialkit-toggle-thumb { left: 16px; }

    .dial-row-hidden { display: none !important; }

    .dialkit-slider-row {
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px 10px; background: var(--dial-surface); border-radius: var(--dial-radius);
    }
    .dialkit-slider-row-top {
      display: flex; justify-content: space-between;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      color: var(--dial-text-label);
    }
    .dialkit-slider-row input[type="range"] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
      background: var(--dial-surface-active); border-radius: 2px; outline: none;
    }
    .dialkit-slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
      background: var(--dial-text-primary); cursor: pointer;
    }
    .dialkit-slider-row input[type="range"]::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%; border: none;
      background: var(--dial-text-primary); cursor: pointer;
    }

    /* ── Photo frame modal ─────────────────────────────────── */
    #frame-overlay {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      padding: 20px; box-sizing: border-box;
    }
    #frame-overlay.open { display: flex; }

    #frame-scaler { position: relative; flex-shrink: 0; }
    #frame {
      position: relative;
      width: 468px; height: 481px;
      background: #000000;
      outline: 1px solid #fff;
      box-shadow: 0 8px 60px rgba(0,0,0,0.9);
      transform-origin: top left;
    }
    #frame .media {
      position: absolute;
      width: 468px; height: 331px;
      left: 0; bottom: 0;
      object-fit: cover;
    }
    #frame-caption {
      position: absolute; left: 24px; top: 27px;
      width: 220px; height: 20px;
      background: none; border: none; outline: none;
      font-family: 'Doto', monospace;
      font-weight: 400; font-size: 12px; line-height: 14px;
      color: #C0C0C0;
      padding: 0; letter-spacing: 1px;
      text-transform: none;
    }
    #frame-caption::placeholder { color: #C0C0C0; opacity: 0.7; }
    #frame .top-right {
      position: absolute; top: 27px; right: 24px;
      display: flex; align-items: baseline; gap: 18px;
      font-family: 'Doto', monospace; letter-spacing: 1px;
      font-size: 12px; line-height: 14px;
      color: #C0C0C0;
      white-space: nowrap;
    }

    #frame-actions { display: flex; gap: 10px; flex-shrink: 0; }
    #frame-actions button { padding: 9px 26px; font-size: 10px; }

    /* ── Mobile / narrow viewport ──────────────────────────── */
    @media (max-width: 600px) {
      #overlay .logo { width: 200px; }
      button { padding: 10px 26px; font-size: 10px; }

      #hud-wrap { bottom: 14px; left: 14px; }
      #hud { font-size: 9px; }

      #cam-btn { bottom: 14px; right: 14px; padding: 10px; }
      #cam-btn svg { width: 22px; height: 19px; }
      #cam-menu { bottom: 56px; right: 14px; }
      #rec-dot { bottom: 24px; right: 54px; }

      #dial { top: 14px; right: 14px; }
      #dial-panel { width: 200px; }

      #frame-actions { gap: 8px; }
      #frame-actions button { padding: 10px 20px; font-size: 9px; }
    }

    @media (max-width: 600px) and (orientation: landscape) {
      #frame-overlay { flex-direction: row; gap: 20px; }
    }
  </style>
</head>
<body>

<video id="cam" playsinline></video>
<canvas id="c"></canvas>

<div id="overlay">
  <img class="logo" src="logo.svg" alt="Your Voice Is Art — become the particles" />
  <button id="btn"><span>B</span><span>E</span><span>G</span><span>I</span><span>N</span></button>
</div>

<div id="hud-wrap">
  <button id="hud-toggle">▲</button>
  <div id="hud">
    VOL &nbsp;<b id="h-vol">—</b><br>
    PITCH <b id="h-pitch">—</b><br>
    SIG &nbsp;&nbsp;<b id="h-sig">—</b><br>
    PTS &nbsp;&nbsp;<b id="h-pts">—</b>
  </div>
</div>

<button id="cam-btn" title="Capture">
  <svg width="19" height="16" viewBox="0 0 19 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9.1 12.9152C10.1975 12.9152 11.1077 12.5454 11.8307 11.8058C12.5537 11.0661 12.9152 10.1642 12.9152 9.1C12.9152 8.0525 12.5537 7.15475 11.8307 6.40675C11.1077 5.65875 10.1975 5.28475 9.1 5.28475C8.0025 5.28475 7.09225 5.65875 6.36925 6.40675C5.64625 7.15475 5.28475 8.05667 5.28475 9.1125C5.28475 10.1683 5.64625 11.0661 6.36925 11.8058C7.09225 12.5454 8.0025 12.9152 9.1 12.9152ZM9.1 11.6155C8.3615 11.6155 7.75767 11.3714 7.2885 10.8833C6.81917 10.3953 6.5845 9.7925 6.5845 9.075C6.5845 8.3715 6.81917 7.78058 7.2885 7.30225C7.75767 6.82375 8.3615 6.5845 9.1 6.5845C9.8385 6.5845 10.4423 6.82375 10.9115 7.30225C11.3808 7.78058 11.6155 8.3715 11.6155 9.075C11.6155 9.7925 11.3808 10.3953 10.9115 10.8833C10.4423 11.3714 9.8385 11.6155 9.1 11.6155ZM1.60775 15.8C1.16925 15.8 0.791667 15.6417 0.475 15.325C0.158333 15.0083 0 14.6308 0 14.1923V4.00775C0 3.56925 0.158333 3.19167 0.475 2.875C0.791667 2.55833 1.16925 2.4 1.60775 2.4H4.5115L5.81925 0.65775C5.98342 0.443583 6.17908 0.280416 6.40625 0.16825C6.63358 0.0560829 6.87317 0 7.125 0H11.0795C11.3342 0 11.5737 0.0560829 11.798 0.16825C12.0223 0.280416 12.2166 0.443583 12.3807 0.65775L13.6885 2.4H16.5923C17.0424 2.4 17.4229 2.55833 17.7337 2.875C18.0446 3.19167 18.2 3.56925 18.2 4.00775V14.1923C18.2 14.6308 18.0446 15.0083 17.7337 15.325C17.4229 15.6417 17.0424 15.8 16.5923 15.8H1.60775ZM1.60775 14.5H16.5923C16.6821 14.5 16.7558 14.4712 16.8135 14.4135C16.8712 14.3558 16.9 14.2821 16.9 14.1923V4.00775C16.9 3.91792 16.8712 3.84417 16.8135 3.7865C16.7558 3.72883 16.6821 3.7 16.5923 3.7H13.0193L11.2072 1.3H6.9905L5.18075 3.7H1.60775C1.51792 3.7 1.44417 3.72883 1.3865 3.7865C1.32883 3.84417 1.3 3.91792 1.3 4.00775V14.1923C1.3 14.2821 1.32883 14.3558 1.3865 14.4135C1.44417 14.4712 1.51792 14.5 1.60775 14.5Z" fill="#E3E3E3"/>
  </svg>
</button>

<div id="cam-menu">
  <button id="shot-still">PHOTO</button>
  <button id="shot-clip">RECORD</button>
</div>

<div id="rec-dot"></div>

<div id="dial">
  <button id="dial-toggle" title="Visuals">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round">
      <line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2" fill="#fff" stroke="none"/>
      <line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2" fill="#fff" stroke="none"/>
      <line x1="4" y1="18" x2="20" y2="18"/><circle cx="11" cy="18" r="2" fill="#fff" stroke="none"/>
    </svg>
  </button>
  <div id="dial-panel">
    <div class="dial-title">Visuals</div>

    <div style="position:relative;">
      <button class="dialkit-select-trigger" id="mode-trigger" data-open="false">
        <span>Mode</span>
        <span class="dialkit-select-right">
          <span class="dialkit-select-value" id="mode-value">Particles</span>
          <svg class="dialkit-select-chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M5 7l5 5 5-5"/></svg>
        </span>
      </button>
      <div class="dialkit-select-dropdown" id="mode-dropdown">
        <button class="dialkit-select-option" data-value="particles" data-selected="true">Particles</button>
        <button class="dialkit-select-option" data-value="risograph" data-selected="false">Risograph</button>
        <button class="dialkit-select-option" data-value="transcript" data-selected="false">Transcript</button>
        <button class="dialkit-select-option" data-value="ink" data-selected="false">Ink</button>
        <button class="dialkit-select-option" data-value="bubble" data-selected="false">Bubble Chamber</button>
      </div>
    </div>

    <div class="dialkit-toggle" id="cam-toggle" data-checked="false">
      <span class="dialkit-toggle-label">Camera View</span>
      <div class="dialkit-toggle-track"><div class="dialkit-toggle-thumb"></div></div>
    </div>

    <div class="dialkit-slider-row dial-row-hidden" id="cam-dim-row">
      <div class="dialkit-slider-row-top"><span>Dim</span><span id="cam-dim-value">55%</span></div>
      <input type="range" id="cam-dim-slider" min="0" max="100" value="55" />
    </div>
  </div>
</div>

<div id="frame-overlay">
  <div id="frame-scaler">
    <div id="frame">
      <input id="frame-caption" type="text" placeholder="Write caption" maxlength="40" />
      <div class="top-right">
        <span>yourvoice.art</span>
        <span id="frame-date"></span>
      </div>
      <img class="media" id="frame-img" style="display:none" />
      <video class="media" id="frame-video" style="display:none" autoplay loop muted playsinline></video>
    </div>
  </div>
  <div id="frame-actions">
    <button id="frame-save">SAVE</button>
    <button id="frame-close">CLOSE</button>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>

// ══════════════════════════════════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = innerWidth;
let H = canvas.height = innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
});

// ══════════════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════════════════════════════
let audioCtx, analyser, timeBuf, micStream;
const FFT = 2048;

async function initAudio() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  micStream = stream;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = FFT;
  analyser.smoothingTimeConstant = 0.6;
  src.connect(analyser);
  timeBuf = new Float32Array(FFT);
}

function getRMS() {
  if (!analyser) return 0;
  analyser.getFloatTimeDomainData(timeBuf);
  let s = 0;
  for (let i = 0; i < FFT; i++) s += timeBuf[i] * timeBuf[i];
  return Math.sqrt(s / FFT);
}

function getPitch() {
  if (!analyser) return -1;
  analyser.getFloatTimeDomainData(timeBuf);
  let rms = 0;
  for (let i = 0; i < FFT; i++) rms += timeBuf[i] * timeBuf[i];
  if (Math.sqrt(rms / FFT) < 0.012) return -1;
  let r1 = 0, r2 = FFT - 1;
  for (let i = 0; i < FFT / 2; i++) { if (Math.abs(timeBuf[i]) < 0.15)      { r1 = i;       break; } }
  for (let i = 1; i < FFT / 2; i++) { if (Math.abs(timeBuf[FFT - i]) < 0.15){ r2 = FFT - i; break; } }
  const buf = timeBuf.slice(r1, r2);
  const M = buf.length;
  const c = new Float32Array(M);
  for (let i = 0; i < M; i++) for (let j = 0; j < M - i; j++) c[i] += buf[j] * buf[j + i];
  let d = 0;
  while (d < M - 1 && c[d] > c[d + 1]) d++;
  let mv = -1, mp = -1;
  for (let i = d; i < M; i++) { if (c[i] > mv) { mv = c[i]; mp = i; } }
  if (mp < 1 || mp >= M - 1) return -1;
  const x1 = c[mp-1], x2 = c[mp], x3 = c[mp+1];
  const a = (x1 + x3 - 2*x2) / 2;
  const b = (x3 - x1) / 2;
  const T0 = a ? mp - b / (2*a) : mp;
  const hz = audioCtx.sampleRate / T0;
  return hz > 60 && hz < 1400 ? hz : -1;
}

// ══════════════════════════════════════════════════════════════════════
// PITCH SIGNATURES — 6 bands, each with distinct color + shape identity
// ══════════════════════════════════════════════════════════════════════
const SIGS = [
  {                         // ① 60–180 Hz  deep / bass
    name: 'BASS',
    shape: 'orb',            // large soft circle
    szBody: [1.2, 2.0],      // body dot size range
    szAccent: [4, 8],        // accent shape size
  },
  {                         // ② 180–300 Hz  low / baritone
    name: 'LOW',
    shape: 'ring',           // circle outline + center dot
    szBody: [1.0, 1.8],
    szAccent: [4, 7],
  },
  {                         // ③ 300–450 Hz  mid-low / alto
    name: 'ALTO',
    shape: 'diamond',        // rotated square
    szBody: [1.0, 1.6],
    szAccent: [3, 7],
  },
  {                         // ④ 450–650 Hz  mid / mezzo-soprano
    name: 'MEZZO',
    shape: 'square',         // flat confetti rect
    szBody: [1.0, 1.6],
    szAccent: [3, 6],
  },
  {                         // ⑤ 650–900 Hz  high / soprano
    name: 'SOPRANO',
    shape: 'cross',          // + cross
    szBody: [0.8, 1.4],
    szAccent: [3, 5],
  },
  {                         // ⑥ 900–1400 Hz  very high / falsetto
    name: 'FALSETTO',
    shape: 'spark',          // 4-arm sparkle
    szBody: [0.7, 1.2],
    szAccent: [2, 5],
  },
];

function getSig(hz) {
  if (hz < 130)  return SIGS[0];   // BASS      60–130 Hz
  if (hz < 200)  return SIGS[1];   // LOW      130–200 Hz
  if (hz < 290)  return SIGS[2];   // ALTO     200–290 Hz
  if (hz < 400)  return SIGS[3];   // MEZZO    290–400 Hz
  if (hz < 560)  return SIGS[4];   // SOPRANO  400–560 Hz
  return SIGS[5];                   // FALSETTO 560–1400 Hz
}

// ══════════════════════════════════════════════════════════════════════
// CONTINUOUS PITCH COLOR — a smooth gradient across Hz, not discrete bands.
// Anchors keep each signature's identity color at its band center, with
// extra in-between stops (esp. Mezzo→Soprano: yellow, yellow-orange,
// orange, pinkish-orange, pink) so color visibly shifts within any ~50Hz
// window instead of jumping at band boundaries.
// ══════════════════════════════════════════════════════════════════════
const COLOR_STOPS = [
  { hz: 60,   c: [0x77, 0x22, 0xDD] },  // deep violet
  { hz: 100,  c: [0x99, 0x33, 0xFF] },  // BASS
  { hz: 145,  c: [0x55, 0x44, 0xFF] },  // blue-violet
  { hz: 165,  c: [0x11, 0x77, 0xFF] },  // LOW
  { hz: 210,  c: [0x00, 0x99, 0xCC] },  // cyan-blue
  { hz: 245,  c: [0x00, 0xCC, 0x88] },  // ALTO
  { hz: 300,  c: [0x66, 0xCC, 0x44] },  // yellow-green
  { hz: 345,  c: [0xFF, 0xBB, 0x00] },  // MEZZO — yellow
  { hz: 380,  c: [0xFF, 0xA0, 0x20] },  // yellow-orange
  { hz: 415,  c: [0xFF, 0x7A, 0x1A] },  // orange
  { hz: 450,  c: [0xFF, 0x55, 0x66] },  // pinkish-orange
  { hz: 480,  c: [0xFF, 0x11, 0x88] },  // SOPRANO — hot pink
  { hz: 560,  c: [0xFF, 0x66, 0xCC] },  // light pink
  { hz: 700,  c: [0xEF, 0xAA, 0xEE] },  // pale orchid
  { hz: 900,  c: [0xDF, 0xFF, 0xFF] },  // FALSETTO — pale cyan-white
  { hz: 1100, c: [0xEE, 0xFF, 0xFF] },
  { hz: 1400, c: [0xFF, 0xFF, 0xFF] },  // white
];

function colorForHz(hz) {
  const lo = COLOR_STOPS[0].hz, hi = COLOR_STOPS[COLOR_STOPS.length - 1].hz;
  const h = Math.max(lo, Math.min(hi, hz));
  let i = 0;
  while (i < COLOR_STOPS.length - 2 && COLOR_STOPS[i + 1].hz < h) i++;
  const a = COLOR_STOPS[i], b = COLOR_STOPS[i + 1];
  const t = (h - a.hz) / (b.hz - a.hz);
  const rgb = [0, 1, 2].map(k => Math.round(a.c[k] + (b.c[k] - a.c[k]) * t));
  return '#' + rgb.map(v => v.toString(16).padStart(2, '0')).join('');
}

// Small per-particle Hz jitter for visual variety, same role the old
// multi-color palettes played, but sampled from the continuous gradient.
function rndColor(hz) { return colorForHz(hz + (Math.random() - 0.5) * 40); }

// ══════════════════════════════════════════════════════════════════════
// PARTICLE POOLS
// ══════════════════════════════════════════════════════════════════════
const BODY_HOLD  = 30;   // 0.5 s hold
const BODY_FADE  = 30;   // 0.5 s fade
const VOICE_HOLD = 180;  // 3 s hold
const VOICE_FADE = 60;   // 1 s fade
const MAX_BODY   = 9000;
const MAX_VOICE  = 2500;

let bodyPool  = [];
let voicePool = [];

// Body silhouette particles — lightweight plain objects
function spawnBody(x, y, color, sz) {
  if (bodyPool.length >= MAX_BODY) return;
  bodyPool.push({
    x, y, color, sz, age: 0,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
  });
}

// Voice-driven accent particles — carry shape + rotation
function spawnVoice(x, y, sig, sz, shape) {
  if (voicePool.length >= MAX_VOICE) return;
  voicePool.push({
    x, y, sz, shape, age: 0,
    color: rndColor(smoothPitch),
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.05,
    vx: (Math.random() - 0.5) * 0.35,
    vy: (Math.random() - 0.5) * 0.35,
  });
}


// ══════════════════════════════════════════════════════════════════════
// SHAPE RENDERER
// ══════════════════════════════════════════════════════════════════════
function drawShape(g, shape, x, y, sz, color, rot) {
  g.save();
  g.translate(x, y);
  g.rotate(rot);
  g.fillStyle   = color;
  g.strokeStyle = color;

  switch (shape) {
    case 'orb':
      g.beginPath();
      g.arc(0, 0, sz, 0, Math.PI * 2);
      g.fill();
      break;

    case 'ring':
      g.lineWidth = Math.max(0.6, sz * 0.22);
      g.beginPath();
      g.arc(0, 0, sz * 0.72, 0, Math.PI * 2);
      g.stroke();
      g.beginPath();
      g.arc(0, 0, sz * 0.18, 0, Math.PI * 2);
      g.fill();
      break;

    case 'diamond':
      g.beginPath();
      g.moveTo(0, -sz);
      g.lineTo(sz * 0.58, 0);
      g.lineTo(0,  sz);
      g.lineTo(-sz * 0.58, 0);
      g.closePath();
      g.fill();
      break;

    case 'square':
      g.fillRect(-sz * 0.85, -sz * 0.38, sz * 1.7, sz * 0.76);
      break;

    case 'cross': {
      const lw = Math.max(0.7, sz * 0.28);
      g.lineWidth = lw;
      g.lineCap   = 'round';
      g.beginPath(); g.moveTo(-sz, 0); g.lineTo(sz, 0); g.stroke();
      g.beginPath(); g.moveTo(0, -sz); g.lineTo(0, sz); g.stroke();
      break;
    }

    case 'spark': {
      g.lineWidth = Math.max(0.5, sz * 0.2);
      g.lineCap   = 'round';
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        g.beginPath();
        g.moveTo(0, 0);
        g.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
        g.stroke();
      }
      g.beginPath();
      g.arc(0, 0, sz * 0.15, 0, Math.PI * 2);
      g.fillStyle = '#fff';
      g.fill();
      break;
    }
  }
  g.restore();
}

// ══════════════════════════════════════════════════════════════════════
// BODY SEGMENTATION (MediaPipe SelfieSegmentation)
// ══════════════════════════════════════════════════════════════════════
let bodyPixels = [];     // cached screen-coord list of person pixels
const segCanvas = document.createElement('canvas');
const segCtx    = segCanvas.getContext('2d', { willReadFrequently: true });

function onSegResults(results) {
  const mask = results.segmentationMask;
  if (!mask) return;
  const mw = mask.width, mh = mask.height;
  segCanvas.width  = mw;
  segCanvas.height = mh;
  segCtx.drawImage(mask, 0, 0);
  const raw = segCtx.getImageData(0, 0, mw, mh).data;

  bodyPixels = [];
  // stride 3 → check ~57k pixels from 640×480, fast enough each seg frame
  for (let y = 0; y < mh; y += 3) {
    for (let x = 0; x < mw; x += 3) {
      if (raw[(y * mw + x) * 4] > 110) {        // R channel = person confidence
        bodyPixels.push({
          sx: (x / mw) * W,
          sy: (y / mh) * H,
        });
      }
    }
  }
}

function sampleBody(n) {
  if (!bodyPixels.length) return [];
  const out = [];
  for (let i = 0; i < n; i++)
    out.push(bodyPixels[Math.floor(Math.random() * bodyPixels.length)]);
  return out;
}

// ══════════════════════════════════════════════════════════════════════
// HAND TRACKING (MediaPipe Hands)
// ══════════════════════════════════════════════════════════════════════
let handPalms = [];

function onHandResults(results) {
  handPalms = [];
  if (!results.multiHandLandmarks) return;
  for (const lm of results.multiHandLandmarks) {
    const p = lm[9], th = lm[4], ix = lm[8];
    handPalms.push({
      x: p.x * W,
      y: p.y * H,
      pinching: Math.hypot(th.x - ix.x, th.y - ix.y) < 0.06,
    });
  }
}

// ══════════════════════════════════════════════════════════════════════
// CAMERA INIT — feeds both models from one stream
// ══════════════════════════════════════════════════════════════════════
async function initCamera(videoEl) {
  const seg = new SelfieSegmentation({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
  });
  seg.setOptions({ modelSelection: 1, selfieMode: true });
  seg.onResults(onSegResults);

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({ maxNumHands: 2, modelComplexity: 0,
    minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
  hands.onResults(onHandResults);

  const cam = new Camera(videoEl, {
    onFrame: async () => {
      await seg.send({ image: videoEl });
      await hands.send({ image: videoEl });
    },
    width: 640, height: 480,
  });
  await cam.start();
}

// ══════════════════════════════════════════════════════════════════════
// EFFECT LAYER — every visual mode draws onto this offscreen buffer; it
// is composited with 'screen' blend over the background (solid black or
// camera feed + dark overlay) each frame. Modes that want trailing
// persistence (ink, bubble chamber) fade it slowly — or not at all — instead
// of clearing it outright.
// ══════════════════════════════════════════════════════════════════════
const fxCanvas = document.createElement('canvas');
const fx = fxCanvas.getContext('2d');
function resizeFx() { fxCanvas.width = W; fxCanvas.height = H; }
resizeFx();
window.addEventListener('resize', resizeFx);

let vizMode    = 'particles';   // 'particles' | 'risograph' | 'transcript' | 'ink' | 'bubble'
let cameraOn   = false;
let cameraDim  = 0.55;

const FADE_ALPHA = {
  particles:  1,      // pool-managed lifecycle — full clear each frame
  risograph:  1,      // shader redraws the full frame live — full clear each frame
  transcript: 1,      // word-managed lifecycle — full clear each frame
  ink:        0.004,  // smallest reliably-quantized alpha step (see FADE_SKIP_PROB)
  bubble:     0.02,   // glowing trail persistence
};
// The canvas's 8-bit alpha precision quantizes very small per-frame fade
// rates to a hard floor (~4.25s to fully dim, however small a rate is
// requested), so total fade duration past that floor is instead tuned by
// probabilistically skipping the fade on some frames.
const FADE_SKIP_PROB = { ink: 0.15 };   // stretches ink's ~4.25s floor to ~5s

function drawCameraBackground(g) {
  const vid = document.getElementById('cam');
  if (vid.readyState >= 2 && vid.videoWidth) {
    const vw = vid.videoWidth, vh = vid.videoHeight;
    const s  = Math.max(W / vw, H / vh);
    const sw = W / s, sh = H / s;
    const sx = (vw - sw) / 2, sy = (vh - sh) / 2;
    g.save();
    g.translate(W, 0);
    g.scale(-1, 1);              // mirror to match selfie-mode segmentation coords
    g.drawImage(vid, sx, sy, sw, sh, 0, 0, W, H);
    g.restore();
    g.fillStyle = `rgba(0,0,0,${cameraDim})`;
    g.fillRect(0, 0, W, H);
  } else {
    g.fillStyle = '#000';
    g.fillRect(0, 0, W, H);
  }
}

// ── PARTICLES (default mode) ─────────────────────────────────────────
function renderParticles(vol, active, sig) {
  if (bodyPixels.length > 0) {
    const bodyCount = 38 + Math.floor(vol * 22);
    for (const bp of sampleBody(bodyCount)) {
      const sz = sig.szBody[0] + Math.random() * (sig.szBody[1] - sig.szBody[0]);
      spawnBody(bp.sx, bp.sy, rndColor(smoothPitch), sz);
    }

    const vCount = active ? Math.floor(4 + vol * 10) : 2;
    const src = sampleBody(vCount);
    for (let i = 0; i < vCount; i++) {
      const bp  = src[i];
      const bdx = bp.sx - W * 0.5, bdy = bp.sy - H * 0.45;
      const bd  = Math.sqrt(bdx * bdx + bdy * bdy) || 1;
      const spr = active ? 5 + Math.random() * 22 : 2 + Math.random() * 8;
      const vx  = bp.sx + (bdx / bd) * spr * Math.random();
      const vy  = bp.sy + (bdy / bd) * spr * Math.random();
      const isAccent = active && Math.random() < 0.22;
      const sz = isAccent
        ? sig.szAccent[0] + Math.random() * (sig.szAccent[1] - sig.szAccent[0])
        : sig.szBody[1]   + Math.random() * 1.2;
      spawnVoice(vx, vy, sig, sz, isAccent ? sig.shape : 'orb');
    }
  } else if (active) {
    const vCount = Math.floor(4 + vol * 10);
    for (let i = 0; i < vCount; i++) {
      const isAccent = Math.random() < 0.22;
      const sz = isAccent
        ? sig.szAccent[0] + Math.random() * (sig.szAccent[1] - sig.szAccent[0])
        : sig.szBody[1]   + Math.random() * 1.2;
      spawnVoice(Math.random() * W, Math.random() * H, sig, sz, isAccent ? sig.shape : 'orb');
    }
  }

  for (let i = bodyPool.length - 1; i >= 0; i--) {
    const p = bodyPool[i];
    p.vx += (Math.random() - 0.5) * 0.04;
    p.vy += (Math.random() - 0.5) * 0.04;
    p.vx *= 0.90; p.vy *= 0.90;
    p.x  += p.vx; p.y  += p.vy;
    p.age++;
    if (p.age > BODY_HOLD + BODY_FADE) { bodyPool.splice(i, 1); }
  }

  for (let i = voicePool.length - 1; i >= 0; i--) {
    const p = voicePool[i];
    p.vx *= 0.95; p.vy *= 0.95;
    p.x  += p.vx; p.y  += p.vy;
    p.rot += p.rotSpd;
    p.age++;
    if (p.age > VOICE_HOLD + VOICE_FADE) { voicePool.splice(i, 1); }
  }

  fx.save();
  fx.globalCompositeOperation = 'screen';
  for (const p of bodyPool) {
    const a = p.age <= BODY_HOLD
      ? 0.80
      : 0.80 * (1 - (p.age - BODY_HOLD) / BODY_FADE);
    if (a <= 0) continue;
    fx.globalAlpha = a;
    fx.fillStyle   = p.color;
    fx.beginPath();
    fx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
    fx.fill();
  }
  fx.restore();

  fx.save();
  fx.globalCompositeOperation = 'screen';
  for (const p of voicePool) {
    const a = p.age <= VOICE_HOLD
      ? 0.90
      : 0.90 * (1 - (p.age - VOICE_HOLD) / VOICE_FADE);
    if (a <= 0) continue;
    fx.globalAlpha = a;
    drawShape(fx, p.shape, p.x, p.y, p.sz, p.color, p.rot);
  }
  fx.restore();
}

// ── RISOGRAPH ─────────────────────────────────────────────────────────
// A real WebGL fragment shader, adapted from a p5.js hatching-sketch that
// used ml5 BodyPix parts + faceMesh (neither available here). A sparse
// canvas2d version of this was tried first but couldn't reproduce the
// dense, continuous engraved-line texture the shader produces per pixel,
// so this renders an actual WebGL pass instead: cross-hatch lines whose
// density follows live video luminance, masked to the body silhouette
// (reusing the same MediaPipe segmentation mask/canvas as the rest of the
// app), in the current pitch-signature color on a transparent/black field
// — no paper background — composited through the same fx + screen-blend
// pipeline every other mode uses. There's no per-part (arm) segmentation
// available, so unlike the reference this uses one ink color throughout,
// modulated by singing instead of by body part.
const glCanvas = document.createElement('canvas');
function resizeGl() { glCanvas.width = W; glCanvas.height = H; }
resizeGl();
window.addEventListener('resize', resizeGl);
const gl = glCanvas.getContext('webgl', { premultipliedAlpha: false });

const RISO_VERT = `
attribute vec2 aPos;
varying vec2 vUv;
void main() {
  vUv = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

const RISO_FRAG = `
precision highp float;
varying vec2 vUv;
uniform sampler2D uVideo;
uniform sampler2D uMask;
uniform vec2 uVideoRes;
uniform float uTime;
uniform vec2 uHead;
uniform float uEyeOk;
uniform vec3 uInkColor;
uniform float uActive;

float luma(vec3 c){ return dot(c, vec3(0.299, 0.587, 0.114)); }

float hash12(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * .1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

float noise(vec2 p){
  vec2 ip = floor(p);
  vec2 u = fract(p);
  u = u*u*(3.0-2.0*u);
  float res = mix(
    mix(hash12(ip), hash12(ip+vec2(1.0,0.0)), u.x),
    mix(hash12(ip+vec2(0.0,1.0)), hash12(ip+vec2(1.0,1.0)), u.x), u.y);
  return res*res;
}

vec3 getPixel(sampler2D tex, vec2 uv) {
  // raw video isn't pre-mirrored — flip to match our mirrored uv space
  return texture2D(tex, vec2(1.0 - uv.x, uv.y)).rgb;
}
float getMask(sampler2D tex, vec2 uv) {
  // MediaPipe's mask is already selfie-mirrored, matching uv directly
  return texture2D(tex, uv).r;
}

vec2 boil(vec2 uv, float strength) {
  float t = floor(uTime * 12.0);
  float dx = hash12(uv * 50.0 + t) - 0.5;
  float dy = hash12(uv * 50.0 + t + 13.5) - 0.5;
  return uv + vec2(dx, dy) * strength;
}

float hatch(vec2 uv, float density, float brightness, float angleOffset) {
  vec2 p = uv;
  p.x *= uVideoRes.x / uVideoRes.y;
  float angle = 0.785 + angleOffset;
  angle += sin(p.x * 2.0 + p.y * 3.0) * 0.2;
  vec2 dir = vec2(cos(angle), sin(angle));
  vec2 nDir = vec2(-dir.y, dir.x);
  float v = dot(p, nDir);
  float thick = 1.0 - brightness;
  thick = smoothstep(0.2, 0.8, thick);
  float lines = sin(v * density * 300.0);
  float ink = smoothstep(1.0 - thick, 1.0 - thick + 0.1, lines);
  float texture = noise(uv * 200.0);
  ink *= smoothstep(0.2, 0.4, texture + 0.2);
  return ink;
}

void main(){
  vec2 uv = vUv;
  vec2 sketchUV = boil(uv, 0.0015);

  vec3 vid = getPixel(uVideo, sketchUV);
  float b = luma(vid);

  float maskNoise = noise(uv * 50.0 + uTime);
  float pMask = smoothstep(0.3, 0.6, getMask(uMask, uv) + (maskNoise-0.5)*0.05);

  float stroke1 = hatch(sketchUV, 1.0, b, 0.0);
  float stroke2 = hatch(sketchUV, 0.8, b, 1.57);
  float density = clamp(stroke1 + stroke2 * (0.4 + uActive * 0.4), 0.0, 1.0);

  vec3 col = uInkColor * density * pMask;

  if (uEyeOk > 0.5) {
    vec2 asp = vec2(uVideoRes.x/uVideoRes.y, 1.0);
    float d = length((uv - uHead) * asp);
    float ring = abs(d - 0.09) - 0.004;
    float scribble = noise(vec2(atan(uv.y-uHead.y, uv.x-uHead.x)*10.0, uTime*2.0));
    float focus = smoothstep(0.01, 0.0, ring + scribble*0.01);
    col = mix(col, vec3(1.0, 0.85, 0.2), focus * 0.9);
  }

  gl_FragColor = vec4(col, 1.0);
}
`;

let risoProgram = null, risoUniforms = {}, risoBuffers = {};
let risoVideoTex = null, risoMaskTex = null;
let risoReady = false, risoInitTried = false;
let risoStrokeCount = 0;
const risoFallbackMaskCanvas = document.createElement('canvas');
risoFallbackMaskCanvas.width = 320; risoFallbackMaskCanvas.height = 240;
const risoFallbackMaskCtx = risoFallbackMaskCanvas.getContext('2d');

function compileRisoShader(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error('Risograph shader error:', gl.getShaderInfoLog(sh));
    return null;
  }
  return sh;
}

function initRisoGl() {
  if (!gl) return false;
  // Canvas/video sources upload top-row-first, but WebGL samples textures
  // bottom-up by convention — without this, everything renders upside down.
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  const vs = compileRisoShader(gl.VERTEX_SHADER, RISO_VERT);
  const fs = compileRisoShader(gl.FRAGMENT_SHADER, RISO_FRAG);
  if (!vs || !fs) return false;
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Risograph program link error:', gl.getProgramInfoLog(prog));
    return false;
  }
  risoProgram = prog;

  const posBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
  risoBuffers.pos = posBuf;

  risoUniforms = {
    uVideo:    gl.getUniformLocation(prog, 'uVideo'),
    uMask:     gl.getUniformLocation(prog, 'uMask'),
    uVideoRes: gl.getUniformLocation(prog, 'uVideoRes'),
    uTime:     gl.getUniformLocation(prog, 'uTime'),
    uHead:     gl.getUniformLocation(prog, 'uHead'),
    uEyeOk:    gl.getUniformLocation(prog, 'uEyeOk'),
    uInkColor: gl.getUniformLocation(prog, 'uInkColor'),
    uActive:   gl.getUniformLocation(prog, 'uActive'),
  };

  risoVideoTex = gl.createTexture();
  risoMaskTex  = gl.createTexture();
  [risoVideoTex, risoMaskTex].forEach(tex => {
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  });
  return true;
}

function hexToRgb01(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
}

function renderRisograph(vol, active, sig) {
  if (!risoInitTried) { risoInitTried = true; risoReady = initRisoGl(); }
  if (!risoReady) return;   // WebGL unavailable on this device — skip quietly

  gl.viewport(0, 0, glCanvas.width, glCanvas.height);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(risoProgram);

  const vid = document.getElementById('cam');
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, risoVideoTex);
  if (vid.readyState >= 2 && vid.videoWidth) {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, vid);
  }
  gl.uniform1i(risoUniforms.uVideo, 0);

  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, risoMaskTex);
  if (bodyPixels.length > 0 && segCanvas.width && segCanvas.height) {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, segCanvas);
  } else if (active) {
    // No camera — fallback to a soft pulsing oval so singing still shows something
    risoFallbackMaskCtx.fillStyle = '#000';
    risoFallbackMaskCtx.fillRect(0, 0, 320, 240);
    risoFallbackMaskCtx.fillStyle = '#fff';
    const r = 55 + vol * 45;
    risoFallbackMaskCtx.beginPath();
    risoFallbackMaskCtx.ellipse(160, 120, r, r * 1.3, 0, 0, Math.PI * 2);
    risoFallbackMaskCtx.fill();
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, risoFallbackMaskCanvas);
  }
  gl.uniform1i(risoUniforms.uMask, 1);

  gl.uniform2f(risoUniforms.uVideoRes, vid.videoWidth || 640, vid.videoHeight || 480);
  gl.uniform1f(risoUniforms.uTime, performance.now() * 0.001);
  gl.uniform1f(risoUniforms.uActive, active ? 1 : 0);

  const hasMask = bodyPixels.length > 0 || active;
  const headTop = estimateHeadTopPosition();
  // Ring radius in the shader is 0.09 in normalized v-space — push the
  // anchor up by more than that so the ring floats clear above the crown.
  // uHead.y is in WebGL's v-space (0=bottom, 1=top), the opposite of our
  // canvas-space headTop.y (0=top) — flip it, same as the mask/video fix.
  const ringCanvasY = headTop.y - H * 0.13;
  gl.uniform2f(risoUniforms.uHead, headTop.x / W, 1 - ringCanvasY / H);
  gl.uniform1f(risoUniforms.uEyeOk, hasMask ? 1 : 0);

  const inkRgb = hexToRgb01(colorForHz(smoothPitch));
  gl.uniform3f(risoUniforms.uInkColor, inkRgb[0], inkRgb[1], inkRgb[2]);

  gl.bindBuffer(gl.ARRAY_BUFFER, risoBuffers.pos);
  const loc = gl.getAttribLocation(risoProgram, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  fx.drawImage(glCanvas, 0, 0, W, H);
  risoStrokeCount = hasMask ? 1 : 0;
}

// ── TRANSCRIPT (Web Speech API — English) ────────────────────────────
let recognizer = null;
let recognizerSupported = true;
let transcriptWords = [];   // {text, x, y, vx, vy, color, age}
const TRANSCRIPT_HOLD = 180, TRANSCRIPT_FADE = 90;
let spokenWordCount = 0;    // words already spawned for the in-progress utterance

function ensureRecognizer() {
  if (recognizer) return recognizer;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { recognizerSupported = false; return null; }
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  r.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      const words = res[0].transcript.trim().split(/\s+/).filter(Boolean);
      // Only spawn the newly recognized tail — interim results fire as each
      // word is heard, so words appear the moment they're spoken rather than
      // waiting for the whole phrase to finalize.
      if (words.length > spokenWordCount) spawnTranscriptWords(words.slice(spokenWordCount));
      spokenWordCount = res.isFinal ? 0 : words.length;
    }
  };
  r.onerror = () => {};
  r.onend = () => { if (vizMode === 'transcript' && started) { try { r.start(); } catch (e) {} } };
  recognizer = r;
  return r;
}

function startTranscriptMode() {
  const r = ensureRecognizer();
  spokenWordCount = 0;
  if (r) { try { r.start(); } catch (e) {} }
  document.fonts.load("700 20px 'Doto'");
}
function stopTranscriptMode() {
  spokenWordCount = 0;
  if (recognizer) { try { recognizer.stop(); } catch (e) {} }
}

// Rough mouth/chin estimate from the segmentation silhouette — no face
// landmarks are tracked, so this uses the topmost band of body pixels
// (typically the chin/neck in a chest-up framing) as a stand-in for "mouth".
function estimateMouthPosition() {
  if (!bodyPixels.length) return { x: W / 2, y: H / 2 };
  let minY = Infinity;
  for (const bp of bodyPixels) if (bp.sy < minY) minY = bp.sy;
  const band = minY + 24;
  let sx = 0, n = 0;
  for (const bp of bodyPixels) { if (bp.sy <= band) { sx += bp.sx; n++; } }
  return { x: n ? sx / n : W / 2, y: minY + 18 };
}

// Same idea, but anchored above the crown of the head instead of at the
// chin — used to float a mark clear of the head rather than over the neck.
function estimateHeadTopPosition() {
  if (!bodyPixels.length) return { x: W / 2, y: H / 2 };
  let minY = Infinity;
  for (const bp of bodyPixels) if (bp.sy < minY) minY = bp.sy;
  const band = minY + 24;
  let sx = 0, n = 0;
  for (const bp of bodyPixels) { if (bp.sy <= band) { sx += bp.sx; n++; } }
  return { x: n ? sx / n : W / 2, y: minY };
}

function spawnTranscriptWords(words) {
  const sig = getSig(smoothPitch);
  const mouth = estimateMouthPosition();
  for (const word of words) {
    transcriptWords.push({
      text: word,
      x: mouth.x + (Math.random() - 0.5) * 50,
      y: mouth.y + (Math.random() - 0.5) * 14,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.35 - Math.random() * 0.55,
      color: rndColor(smoothPitch),
      age: 0,
    });
  }
  if (transcriptWords.length > 120) transcriptWords.splice(0, transcriptWords.length - 120);
}

function renderTranscript(vol, active, sig) {
  if (!recognizerSupported) {
    fx.save();
    fx.fillStyle = 'rgba(255,255,255,0.5)';
    fx.font = "16px 'Doto', monospace";
    fx.textAlign = 'center';
    fx.fillText('Speech recognition is not supported in this browser', W / 2, H / 2);
    fx.restore();
    return;
  }

  for (let i = transcriptWords.length - 1; i >= 0; i--) {
    const w = transcriptWords[i];
    w.x += w.vx; w.y += w.vy;
    w.vx *= 0.99; w.vy *= 0.995;
    w.age++;
    if (w.age > TRANSCRIPT_HOLD + TRANSCRIPT_FADE) transcriptWords.splice(i, 1);
  }

  fx.save();
  fx.globalCompositeOperation = 'screen';
  fx.textAlign = 'center';
  fx.font = "700 20px 'Doto', monospace";
  for (const w of transcriptWords) {
    const a = w.age <= TRANSCRIPT_HOLD ? 0.9 : 0.9 * (1 - (w.age - TRANSCRIPT_HOLD) / TRANSCRIPT_FADE);
    if (a <= 0) continue;
    fx.globalAlpha = a;
    fx.fillStyle = w.color;
    fx.fillText(w.text, w.x, w.y);
  }
  fx.restore();
}

// ── INK ───────────────────────────────────────────────────────────────
// Adapted from a p5.js flow-field ink sketch: particles continuously spawn
// from a point that wanders (via noise) around the body centroid, then
// drift along a per-particle noise flow field, shrinking to nothing over
// their lifespan. The reference's extra burst on mouse-press is singing
// here instead, spawning from the estimated mouth position. Colored from
// the live pitch signature, matching every other mode; FADE_ALPHA.ink
// still governs the ~5s trace fade (the reference itself never cleared
// its canvas — traces accumulated forever).
let inkObjs = [];
let inkNt = 0;
const INK_NOISE_SCALE = 0.01;
const MAX_INK = 3000;

// noise2D reuses the 1D hash/value-noise from the bubble chamber mode,
// bilinearly interpolated across a 2D lattice for a smooth flow field.
function noise2D(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const h = (a, b) => hashNoise(a * 127.1 + b * 311.7);
  const top = h(xi, yi) * (1 - u) + h(xi + 1, yi) * u;
  const bot = h(xi, yi + 1) * (1 - u) + h(xi + 1, yi + 1) * u;
  return top * (1 - v) + bot * v;
}
function inkFlowNoise(x, y, z) { return noise2D(x + z * 37, y + z * 53); }

function spawnInkObj(x, y) {
  if (inkObjs.length >= MAX_INK) return;
  const lifeMax = 20 + Math.random() * 30;
  inkObjs.push({
    x, y,
    t: Math.random() * INK_NOISE_SCALE,
    lifeMax, life: lifeMax,
    step: 0.1 + Math.random() * 0.4,
    dMax: Math.random() >= 0.5 ? 10 : 30,
    d: 0,
    color: rndColor(smoothPitch),
  });
}

function renderInk(vol, active, sig) {
  let cx = W / 2, cy = H / 2;
  if (bodyPixels.length) {
    let sx = 0, sy = 0;
    for (const bp of bodyPixels) { sx += bp.sx; sy += bp.sy; }
    cx = sx / bodyPixels.length; cy = sy / bodyPixels.length;
  }

  // Ambient baseline — one particle a frame from a noise-driven point
  // orbiting the body (or canvas center with no camera).
  const maxR = Math.max(W, H) * 0.45;
  const R = noise2D(inkNt * 0.01, 0) * maxR;
  const theta = (noise2D(inkNt * 0.001, 1000) * 2 - 1) * 2 * Math.PI;
  spawnInkObj(cx + R * Math.cos(theta), cy + R * Math.sin(theta));

  // Singing bursts, replacing the reference's mouse-press spawn.
  if (active) {
    const mouth = estimateMouthPosition();
    const count = 1 + Math.floor(vol * 4);
    for (let i = 0; i < count; i++) spawnInkObj(mouth.x, mouth.y);
  }

  fx.save();
  fx.globalCompositeOperation = 'source-over';
  for (let i = inkObjs.length - 1; i >= 0; i--) {
    const o = inkObjs[i];
    const flowTheta = (inkFlowNoise(o.x * INK_NOISE_SCALE, o.y * INK_NOISE_SCALE, o.t) * 2 - 1) * 2 * Math.PI;
    o.x += Math.cos(flowTheta);
    o.y += Math.sin(flowTheta);
    o.life -= o.step;
    if (o.life < 0) { inkObjs.splice(i, 1); continue; }
    o.d = (o.life / o.lifeMax) * o.dMax;

    fx.globalAlpha = 0.5;
    fx.fillStyle = o.color;
    fx.beginPath();
    fx.arc(o.x, o.y, o.d / 2, 0, Math.PI * 2);
    fx.fill();
  }
  fx.restore();

  inkNt++;
}

// ── BUBBLE CHAMBER ────────────────────────────────────────────────────
// Adapted from Samuel Yan's p5.js "Bubble Chamber" sketch into canvas2d —
// glowing trails orbit the body centroid instead of a fixed point, driven
// by live pitch/volume instead of pure randomness.
let bubbleOrbiters = null;
function hashNoise(n) { const s = Math.sin(n * 12.9898) * 43758.5453; return s - Math.floor(s); }
function smoothNoise(t) {
  const i = Math.floor(t), f = t - i;
  const u = f * f * (3 - 2 * f);
  return hashNoise(i) * (1 - u) + hashNoise(i + 1) * u;
}

function initBubbleOrbiters() {
  bubbleOrbiters = [];
  for (let i = 0; i < 12; i++) {
    bubbleOrbiters.push({
      seed: Math.random() * 1000,
      angle: Math.random() * Math.PI * 2,
      radius: 40 + Math.random() * 60,
      px: null, py: null,
    });
  }
}

function renderBubbleChamber(vol, active, sig) {
  if (!bubbleOrbiters) initBubbleOrbiters();

  let cx = W / 2, cy = H / 2;
  if (bodyPixels.length) {
    let sx = 0, sy = 0;
    for (const bp of bodyPixels) { sx += bp.sx; sy += bp.sy; }
    cx = sx / bodyPixels.length; cy = sy / bodyPixels.length;
  }

  const t = performance.now() * 0.00035;
  fx.save();
  fx.lineCap = 'round';

  for (const o of bubbleOrbiters) {
    const n = smoothNoise(t * 3 + o.seed);
    o.angle += 0.006 + n * 0.01 + vol * 0.02;
    const targetR = 40 + n * 120 + vol * 140;
    o.radius += (targetR - o.radius) * 0.03;

    const x = cx + Math.cos(o.angle) * o.radius;
    const y = cy + Math.sin(o.angle) * o.radius * 0.7;

    if (o.px !== null) {
      const color = rndColor(smoothPitch);
      fx.globalCompositeOperation = 'lighter';
      fx.strokeStyle = color;
      fx.globalAlpha = 0.5;
      fx.lineWidth = 0.8 + vol * 1.4;
      fx.shadowColor = color;
      fx.shadowBlur = 6;
      fx.beginPath();
      fx.moveTo(o.px, o.py);
      fx.lineTo(x, y);
      fx.stroke();

      if (active && Math.random() < 0.03 + vol * 0.05) {
        const rr = 18 + vol * 30;
        const grd = fx.createRadialGradient(x, y, 0, x, y, rr);
        grd.addColorStop(0, color + '55');
        grd.addColorStop(1, color + '00');
        fx.shadowBlur = 0;
        fx.fillStyle = grd;
        fx.beginPath();
        fx.arc(x, y, rr, 0, Math.PI * 2);
        fx.fill();
      }
    }
    o.px = x; o.py = y;
  }

  fx.restore();
}

function pointCountFor(mode) {
  switch (mode) {
    case 'particles':  return bodyPool.length + voicePool.length;
    case 'risograph':   return risoStrokeCount;
    case 'transcript':  return transcriptWords.length;
    case 'ink':          return inkObjs.length;
    case 'bubble':      return bubbleOrbiters ? bubbleOrbiters.length : 0;
    default: return 0;
  }
}

// ══════════════════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════════════════
let smoothVol = 0, smoothPitch = 260;
let started  = false;
let lastSigName = '';

const elVol   = document.getElementById('h-vol');
const elPitch = document.getElementById('h-pitch');
const elSig   = document.getElementById('h-sig');
const elPts   = document.getElementById('h-pts');

function frame() {
  requestAnimationFrame(frame);

  // ── Background — solid black, or the camera feed dimmed under an overlay
  if (cameraOn && started) {
    drawCameraBackground(ctx);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  if (!started) return;

  // ── Audio read ──────────────────────────────────────────────────────
  const rawVol   = getRMS();
  const rawPitch = getPitch();
  smoothVol   = smoothVol   * 0.80 + rawVol   * 0.20;
  if (rawPitch > 0) smoothPitch = smoothPitch * 0.85 + rawPitch * 0.15;

  const vol    = Math.min(1, Math.max(0, (smoothVol - 0.005) / 0.2));
  const active = smoothVol > 0.018;
  // Always use last known pitch so sig/color persists when silent
  const sig = getSig(smoothPitch);

  // ── Effect layer — fade or clear depending on mode, then draw content
  const skipProb = FADE_SKIP_PROB[vizMode] || 0;
  if (skipProb === 0 || Math.random() >= skipProb) {
    fx.globalCompositeOperation = 'source-over';
    fx.fillStyle = `rgba(0,0,0,${FADE_ALPHA[vizMode]})`;
    fx.fillRect(0, 0, W, H);
  }

  switch (vizMode) {
    case 'particles':  renderParticles(vol, active, sig); break;
    case 'risograph':  renderRisograph(vol, active, sig); break;
    case 'transcript': renderTranscript(vol, active, sig); break;
    case 'ink':        renderInk(vol, active, sig); break;
    case 'bubble':     renderBubbleChamber(vol, active, sig); break;
  }

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.drawImage(fxCanvas, 0, 0);
  ctx.restore();

  // ── HUD ──────────────────────────────────────────────────────────────
  elVol.textContent    = (smoothVol * 100).toFixed(1) + '%';
  elPitch.textContent  = smoothPitch.toFixed(0) + ' Hz';
  elPitch.style.color  = colorForHz(smoothPitch);
  elSig.textContent    = sig.name;
  elSig.style.color    = colorForHz(smoothPitch);
  elPts.textContent    = pointCountFor(vizMode);
}
requestAnimationFrame(frame);

function setVizMode(mode) {
  if (mode === vizMode) return;

// CAPTURE — photo / 3s clip → framed popup
// ══════════════════════════════════════════════════════════════════════
const camBtn    = document.getElementById('cam-btn');
const camMenu   = document.getElementById('cam-menu');
const recDot    = document.getElementById('rec-dot');
const frameOv   = document.getElementById('frame-overlay');
const frameImg  = document.getElementById('frame-img');
const frameVid  = document.getElementById('frame-video');
const frameCap  = document.getElementById('frame-caption');
const frameDate = document.getElementById('frame-date');

let capturedBlob = null;   // Blob of the raw capture
let capturedKind = null;   // 'photo' | 'clip'

function todayStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getMonth() + 1)}.${p(d.getDate())}.${d.getFullYear()}`;
}

const frameEl      = document.getElementById('frame');
const frameScaler  = document.getElementById('frame-scaler');
const FRAME_W = 468, FRAME_H = 481;

function scaleFrame() {
  const actionsH = 44; // approx height reserved for save/close row + gaps
  const availW = window.innerWidth  - 40;
  const availH = window.innerHeight - 40 - actionsH;
  const scale  = Math.min(1, availW / FRAME_W, availH / FRAME_H);
  frameEl.style.transform  = `scale(${scale})`;
  frameScaler.style.width  = `${FRAME_W * scale}px`;
  frameScaler.style.height = `${FRAME_H * scale}px`;
}
window.addEventListener('resize', () => {
  if (frameOv.classList.contains('open')) scaleFrame();
});

function openFrame(blob, kind) {
  capturedBlob = blob;
  capturedKind = kind;
  const url = URL.createObjectURL(blob);
  if (kind === 'photo') {
    frameImg.src = url;
    frameImg.style.display = 'block';
    frameVid.style.display = 'none';
  } else {
    frameVid.src = url;
    frameVid.style.display = 'block';
    frameImg.style.display = 'none';
  }
  frameCap.value = '';
  frameDate.textContent = todayStr();
  frameOv.classList.add('open');
  scaleFrame();
}

// ── Screen + voice recording (manual start/stop) ───────────────
const clipBtn = document.getElementById('shot-clip');
let mediaRecorder = null;
let isRecording   = false;

function startRecording() {
  const videoStream  = canvas.captureStream(30);
  const audioTracks  = micStream ? micStream.getAudioTracks() : [];
  const combined     = new MediaStream([...videoStream.getVideoTracks(), ...audioTracks]);
  const mime = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
  mediaRecorder = new MediaRecorder(combined, { mimeType: mime });
  const chunks = [];
  mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = () => {
    isRecording = false;
    recDot.style.display = 'none';
    clipBtn.textContent  = 'RECORD';
    openFrame(new Blob(chunks, { type: mime }), 'clip');
  };
  isRecording = true;
  recDot.style.display = 'block';
  clipBtn.textContent  = 'STOP';
  mediaRecorder.start();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
}

clipBtn.addEventListener('click', () => {
  camMenu.classList.remove('open');
  if (isRecording) stopRecording(); else startRecording();
});
recDot.addEventListener('click', stopRecording);

// ── Save ─────────────────────────────────────────────────────
function download(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
}

// Draw one postcard frame (texts + media cover-cropped into bottom 468x331)
function drawPostcard(f, media, mw, mh) {
  f.fillStyle = '#000';
  f.fillRect(0, 0, 468, 481);

  f.font = "12px 'Doto', monospace";
  if (frameCap.value.trim()) {
    f.fillStyle = '#C0C0C0';
    f.fillText(frameCap.value.trim(), 24, 43);
  }
  // Right-aligned pair: date flush to right edge, brand 18px left of it
  f.fillStyle = '#C0C0C0';
  const dateStr  = frameDate.textContent;
  const dateW    = f.measureText(dateStr).width;
  const dateX    = 468 - 24 - dateW;
  f.fillText(dateStr, dateX, 43);
  const brandStr = 'yourvoice.art';
  const brandW   = f.measureText(brandStr).width;
  f.fillText(brandStr, dateX - 18 - brandW, 43);

  if (mw && mh) {
    const tw = 468, th = 331;
    const s  = Math.max(tw / mw, th / mh);
    const sw = tw / s, sh = th / s;
    f.drawImage(media, (mw - sw) / 2, (mh - sh) / 2, sw, sh, 0, 481 - th, tw, th);
  }

  // White outline to match the on-screen popup
  f.strokeStyle = '#fff';
  f.lineWidth   = 1;
  f.strokeRect(0.5, 0.5, 467, 480);
}

document.getElementById('frame-save').addEventListener('click', async () => {
  if (!capturedBlob) return;
  await document.fonts.load("12px 'Doto'"); // ensure webfont is ready before canvas text draws
  const stamp = todayStr().replaceAll('.', '-');
  const SCALE = 2;
  const fc = document.createElement('canvas');
  fc.width = 468 * SCALE; fc.height = 481 * SCALE;
  const f = fc.getContext('2d');
  f.scale(SCALE, SCALE);

  if (capturedKind === 'photo') {
    const img = new Image();
    img.onload = () => {
      drawPostcard(f, img, img.width, img.height);
      download(fc.toDataURL('image/png'), `yourvoice-${stamp}.png`);
    };
    img.src = URL.createObjectURL(capturedBlob);
  } else {
    // Re-record the full postcard: draw video into frame canvas each tick,
    // carrying the original audio track along for the ride
    const videoOnlyStream = fc.captureStream(30);
    const audioTracks     = frameVid.captureStream ? frameVid.captureStream().getAudioTracks() : [];
    const stream = new MediaStream([...videoOnlyStream.getVideoTracks(), ...audioTracks]);
    const mime = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
    const rec  = new MediaRecorder(stream, { mimeType: mime });
    const chunks = [];
    let raf;
    rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    rec.onstop = () => {
      cancelAnimationFrame(raf);
      const ext = mime.includes('mp4') ? 'mp4' : 'webm';
      download(URL.createObjectURL(new Blob(chunks, { type: mime })), `yourvoice-${stamp}.${ext}`);
    };
    const tick = () => {
      drawPostcard(f, frameVid, frameVid.videoWidth, frameVid.videoHeight);
      raf = requestAnimationFrame(tick);
    };
    frameVid.onended = () => rec.stop();
    frameVid.currentTime = 0;
    frameVid.play();
    tick();
    rec.start();
  }
});

document.getElementById('frame-close').addEventListener('click', () => {
  frameOv.classList.remove('open');
  frameVid.pause();
  frameVid.src = '';
  frameImg.src = '';
  capturedBlob = null;
});
</script>
